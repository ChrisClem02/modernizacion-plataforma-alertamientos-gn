services:
  postgres_mpna_gn:
    image: postgres:${POSTGRES_VERSION}
    container_name: mpna_gn_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - mpna_gn_postgres_data:/var/lib/postgresql/data
      - ./initdb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend_mpna_gn:
    build:
      context: ./backend
    container_name: mpna_gn_backend
    restart: unless-stopped
    depends_on:
      postgres_mpna_gn:
        condition: service_healthy
    environment:
      NODE_ENV: development
      BACKEND_PORT: ${BACKEND_PORT}
      DB_HOST: postgres_mpna_gn
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB}
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      CORS_ORIGIN: http://localhost:${FRONTEND_PORT}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN}
    ports:
      - "${BACKEND_PORT}:${BACKEND_PORT}"

  frontend_mpna_gn:
    build:
      context: ./frontend
    container_name: mpna_gn_frontend
    restart: unless-stopped
    depends_on:
      backend_mpna_gn:
        condition: service_started
    environment:
      VITE_API_BASE_URL: http://localhost:${BACKEND_PORT}/api
    ports:
      - "${FRONTEND_PORT}:5173"

volumes:
  mpna_gn_postgres_data:
    name: mpna_gn_postgres_data
